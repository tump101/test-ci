name: Next.js CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # รันเฉพาะตอนที่ push เข้า main branch

jobs:
  pipeline:
    runs-on: self-hosted # บังคับให้รันบนเครื่อง Kali Linux ของเรา
    
    steps:
      # [1] CODE: ดึงโค้ดล่าสุดจาก GitHub ลงเครื่อง Server
      - name: Checkout Code
        uses: actions/checkout@v4

      # [2] BUILD & INSTALL: ติดตั้ง dependencies 
      - name: Install Dependencies
        run: npm ci

      # [แก้ไขจุดที่ 1] TEST: สั่งรัน Jest Test จริงที่เราเขียนไว้ (เอาแท็กข้ามออก)
      - name: Run Tests
        run: npm test

      # ส่วนของ Build โค้ด
      - name: Build Next.js Application
        run: npm run build

      # [4] DEPLOY: ย้ายไฟล์ที่ Build เสร็จแล้วไปโฟลเดอร์ปลายทาง และสั่ง Restart เว็บ
      - name: Deploy to Production Folder
        run: |
          # คัดลอกไฟล์ทั้งหมดไปยังโฟลเดอร์ /var/www/nextjs
          rsync -av --delete ./ /var/www/nextjs/
          
          # ย้ายเข้าไปในโฟลเดอร์ปลายทางเพื่อสั่งรันโปรเซส
          cd /var/www/nextjs
          
          # [แก้ไขจุดที่ 2] ปรับคำสั่ง PM2 ให้รันตัว 'next' แทน 'npm run start' เพื่อความสเถียรในการทำงานบน Server
          # โดยเราจะชี้ไปที่ตัว next ใน node_modules ตรงๆ เพื่อป้องกันปัญหา pm2 หาคำสั่งไม่เจอ
          pm2 describe nextjs-app > /dev/null && pm2 reload nextjs-app || pm2 start ./node_modules/next/dist/bin/next --name "nextjs-app" -- start
          
          # บันทึกสถานะ PM2
          pm2 save